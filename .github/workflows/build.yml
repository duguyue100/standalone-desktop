name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            dpkg \
            rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build (Tauri)
        run: bun run build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp packages/desktop/src-tauri/target/release/AlfAlfa artifacts/AlfAlfa-linux-x86_64
          cp packages/desktop/src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alfalfa-linux-x86_64
          path: artifacts/*

  build-macos:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build (Tauri)
        run: bun run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp packages/desktop/src-tauri/target/release/AlfAlfa artifacts/AlfAlfa-macos-aarch64
          cp packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          cp packages/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alfalfa-macos-aarch64
          path: artifacts/*

  release:
    name: Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
